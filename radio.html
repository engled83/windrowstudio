<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Look Who It Is Radio</title>
<style>
:root{
  --bg:#0b0e13;
  --bg2:#111827;
  --accent:#12b76a;
  --accent-soft:rgba(18,183,106,.16);
  --card:rgba(16,23,34,.9);
  --line:rgba(255,255,255,0.08);
  --text:#ffffff;
  --muted:rgba(255,255,255,0.72);
  --shadow:0 24px 60px rgba(0,0,0,.45);
}

*{
  box-sizing:border-box;
}

html,body{
  margin:0;
  padding:0;
  min-height:100%;
}

body{
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
  color:var(--text);
  background:
    radial-gradient(900px 500px at 50% -120px, rgba(18,183,106,.20), transparent 60%),
    linear-gradient(180deg, #0b0e13 0%, #0d1118 100%);
}

.page{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:32px 18px;
}

.container{
  width:100%;
  max-width:760px;
}

.hero{
  text-align:center;
  margin-bottom:22px;
}

.kicker{
  display:inline-block;
  padding:6px 12px;
  border:1px solid rgba(18,183,106,.35);
  background:var(--accent-soft);
  color:#c9f7df;
  border-radius:999px;
  font-size:12px;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  margin-bottom:14px;
}

h1{
  margin:0;
  font-size:clamp(34px, 5vw, 54px);
  line-height:1.02;
  letter-spacing:-1.2px;
}

.subtext{
  margin:12px auto 0;
  max-width:560px;
  color:var(--muted);
  font-size:16px;
  line-height:1.5;
}

.nav{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:24px 0 28px;
  flex-wrap:wrap;
}

.nav a{
  text-decoration:none;
  color:var(--text);
  padding:10px 16px;
  border-radius:999px;
  border:1px solid var(--line);
  background:rgba(255,255,255,0.03);
  font-size:14px;
  font-weight:600;
  transition:all .2s ease;
}

.nav a:hover{
  border-color:rgba(18,183,106,.6);
  background:rgba(18,183,106,.10);
  transform:translateY(-1px);
}

.player-card{
  position:relative;
  background:var(--card);
  border:1px solid var(--line);
  border-radius:24px;
  padding:20px;
  box-shadow:var(--shadow);
  overflow:hidden;
  backdrop-filter:blur(10px);
}

.player-card:before{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(135deg, rgba(18,183,106,.12), transparent 35%),
    linear-gradient(180deg, rgba(255,255,255,.02), transparent 40%);
  pointer-events:none;
}

.player-head{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  margin-bottom:16px;
  flex-wrap:wrap;
}

.player-title{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:18px;
  font-weight:700;
}

.live-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 0 6px rgba(18,183,106,.12);
}

.player-note{
  color:var(--muted);
  font-size:13px;
  font-weight:600;
}

.player-frame{
  position:relative;
  border-radius:18px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.06);
  background:#0f141d;
}

iframe{
  display:block;
  width:100%;
  max-width:100%;
  border:0;
}

.footer-note{
  text-align:center;
  margin-top:16px;
  color:rgba(255,255,255,0.55);
  font-size:13px;
}

@media (max-width:640px){
  .page{
    padding:22px 14px;
    align-items:flex-start;
  }

  .player-card{
    padding:16px;
    border-radius:20px;
  }

  .player-head{
    margin-bottom:14px;
  }

  iframe{
    min-height:300px;
  }
}
</style>
</head>
<body>
  <div class="page">
    <div class="container">
      <div class="hero">
        <div class="kicker">Streaming Now</div>
        <h1>Look Who It Is Radio</h1>
        <p class="subtext">Independent artists, real songs, and a station built to help people find music worth hearing.</p>
      </div>

      <div class="nav">
        <a href="/index.html">Home</a>
        <a href="/lookwhoitis.html">Podcast</a>
        <a href="https://instagram.com/lookwhoitispod" target="_blank" rel="noopener noreferrer">Instagram</a>
        <a href="https://tiktok.com/@lookwhoitispod" target="_blank" rel="noopener noreferrer">TikTok</a>
      </div>

      <div class="player-card">
        <div class="player-head">
          <div class="player-title">
            <span class="live-dot"></span>
            <span>Live Player</span>
          </div>
          <div class="player-note">Powered by Live365</div>
        </div>

        <div class="player-frame">
          <iframe
            width="450"
            height="316"
            src="https://live365.com/embeds/v1/player/a94664?s=md&m=dark&c=mp3"
            allow="autoplay">
          </iframe>
        </div>
      </div>

      <div class="footer-note">
        Listen live anytime from your phone, desktop, or tablet.
      </div>
    </div>
  </div>
</body>
</html>
