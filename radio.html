<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Look Who It Is Radio</title>
<style>
:root{
  --bg:#0b0e13;
  --accent:#12b76a;
  --card:#101722;
  --line:rgba(255,255,255,0.08);
}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
  background:radial-gradient(800px 400px at 50% -100px, rgba(18,183,106,.2), transparent 60%), var(--bg);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
}

.container{
  text-align:center;
  padding:24px;
}

h1{
  margin:0 0 20px;
  font-size:34px;
  letter-spacing:-0.5px;
}

.nav{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-bottom:20px;
  flex-wrap:wrap;
}

.nav a{
  text-decoration:none;
  color:#fff;
  padding:8px 14px;
  border-radius:999px;
  border:1px solid var(--line);
  background:rgba(255,255,255,0.03);
  font-size:14px;
  font-weight:600;
}

.nav a:hover{
  border-color:var(--accent);
}

.player{
  background:var(--card);
  padding:16px;
  border-radius:16px;
  border:1px solid var(--line);
  box-shadow:0 20px 50px rgba(0,0,0,.4);
}

iframe{
  border:0;
  border-radius:10px;
}

@media (max-width:500px){
  iframe{
    width:100%;
    height:300px;
  }
}
</style>
</head>
<body>
  <div class="container">
    <h1>Look Who It Is Radio</h1>

    <div class="nav">
      <a href="/index">Home</a>
      <a href="/lookwhoitis">Podcast</a>
      <a href="https://instagram.com/lookwhoitispod" target="_blank">Instagram</a>
      <a href="https://tiktok.com/lookwhoitispod" target="_blank">TikTok</a>
    </div>

    <div class="player">
      <iframe
        width="450"
        height="316"
        src="https://live365.com/embeds/v1/player/a94664?s=md&m=dark&c=mp3"
        allow="autoplay">
      </iframe>
    </div>

  </div>
</body>
</html>
