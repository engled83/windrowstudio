<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Listen | Look Who It Is Radio</title>
<meta name="description" content="Listen live to Look Who It Is Radio. Country by day, rock at night. Streaming on Live365.">
<style>
:root{
  --bg:#050509;
  --bg2:#0D0A14;
  --card:#111018;
  --purple:#9B2CFF;
  --purple2:#C45CFF;
  --glow:#E07BFF;
  --text:#FFFFFF;
  --soft:#EDE7F8;
  --muted:#A9A0B8;
  --line:rgba(196,92,255,.28);
}

*{box-sizing:border-box;}

html,body{
  margin:0;
  min-height:100%;
}

body{
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  color:var(--text);
  background:
    radial-gradient(850px 420px at 50% -120px, rgba(155,44,255,.32), transparent 65%),
    linear-gradient(180deg,var(--bg),var(--bg2) 55%,var(--bg));
}

a{color:inherit;}

.page{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:28px 16px;
}

.wrap{
  width:min(560px,100%);
  text-align:center;
}

.logo{
  width:210px;
  max-width:72vw;
  margin:0 auto 22px;
  border-radius:26px;
  overflow:hidden;
  background:#06030a;
  border:1px solid rgba(224,123,255,.24);
  box-shadow:0 0 38px rgba(196,92,255,.24);
}

.logo img{
  display:block;
  width:100%;
  height:auto;
}

h1{
  margin:0 0 8px;
  font-size:clamp(32px,6vw,48px);
  line-height:1;
  letter-spacing:-1.8px;
}

.tagline{
  margin:0 0 22px;
  color:var(--soft);
  font-size:17px;
  font-weight:750;
}

.player-card,
.app-card{
  background:rgba(17,16,24,.92);
  border:1px solid var(--line);
  border-radius:26px;
  box-shadow:0 24px 70px rgba(0,0,0,.48);
}

.player-card{
  padding:16px;
}

.player-title{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:9px;
  margin-bottom:12px;
  font-size:17px;
  font-weight:850;
}

.live-dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:var(--glow);
  box-shadow:0 0 0 6px rgba(224,123,255,.13);
}

.player-frame{
  display:flex;
  justify-content:center;
  align-items:center;
  padding:10px;
  border-radius:20px;
  background:#0b0711;
  border:1px solid rgba(255,255,255,.08);
}

iframe{
  display:block;
  width:100%;
  max-width:450px;
  height:316px;
  border:0;
}

.app-card{
  margin-top:18px;
  padding:22px;
}

.app-card h2{
  margin:0 0 10px;
  font-size:24px;
  letter-spacing:-.6px;
}

.steps{
  margin:0 auto 18px;
  padding:0;
  list-style:none;
  color:var(--soft);
  line-height:1.55;
  max-width:410px;
}

.steps li{margin:6px 0;}

.buttons{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.button{
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:46px;
  padding:0 16px;
  border-radius:999px;
  text-decoration:none;
  font-size:14px;
  font-weight:850;
  background:linear-gradient(135deg,var(--purple2),var(--glow));
  color:#12051c;
}

.small-links{
  margin-top:18px;
  color:var(--muted);
  font-size:13px;
}

.small-links a{
  color:var(--soft);
  text-decoration:none;
  border-bottom:1px solid rgba(224,123,255,.45);
}

@media(max-width:520px){
  .page{align-items:flex-start;padding-top:24px;}
  .logo{width:180px;margin-bottom:18px;}
  .player-card,.app-card{border-radius:22px;padding:14px;}
  iframe{height:300px;}
  .buttons{grid-template-columns:1fr;}
}
</style>
</head>
<body>
  <main class="page">
    <div class="wrap">
      <div class="logo">
        <img src="radiologo.png" alt="Look Who It Is Radio logo">
      </div>

      <h1>Listen Live</h1>
      <p class="tagline">Country by day. Rock at night.</p>

      <section class="player-card" aria-label="Live radio player">
        <div class="player-title">
          <span class="live-dot" aria-hidden="true"></span>
          <span>Streaming on Live365</span>
        </div>
        <div class="player-frame">
          <iframe
            width="450"
            height="316"
            src="https://live365.com/embeds/v1/player/a94664?s=md&m=dark&c=mp3"
            allow="autoplay"
            title="Look Who It Is Radio Live365 Player">
          </iframe>
        </div>
      </section>

      <section class="app-card" aria-label="Download the Live365 app">
        <h2>Listen on your phone</h2>
        <ul class="steps">
          <li>1. Download the Live365 app.</li>
          <li>2. Search <strong>Look Who It Is Radio</strong>.</li>
          <li>3. Tap play and follow the station.</li>
        </ul>
        <div class="buttons">
          <a class="button" href="https://apps.apple.com/us/search?term=Live365" target="_blank" rel="noopener noreferrer">App Store</a>
          <a class="button" href="https://play.google.com/store/search?q=Live365&c=apps" target="_blank" rel="noopener noreferrer">Google Play</a>
        </div>
      </section>

      <div class="small-links">
        <a href="/radio.html">Station page</a> · <a href="/submission.html">Submit music</a>
      </div>
    </div>
  </main>
</body>
</html>
