<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Submit Music | Look Who It Is Radio</title>
  <meta name="description" content="Submit music for review to Look Who It Is Radio." />

  <style>
    :root {
      --bg-main: #050509;
      --bg-secondary: #0D0A14;
      --bg-card: #111018;
      --purple: #9B2CFF;
      --purple-bright: #C45CFF;
      --purple-glow: #E07BFF;
      --text: #FFFFFF;
      --text-soft: #EDE7F8;
      --muted: #A9A0B8;
      --border: rgba(237, 231, 248, 0.12);
      --max-width: 900px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(155, 44, 255, 0.22), transparent 36%),
        linear-gradient(180deg, var(--bg-main), var(--bg-secondary));
      color: var(--text);
      min-height: 100vh;
    }

    .page {
      width: 100%;
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 28px 18px 50px;
    }

    .home-button {
      display: inline-block;
      margin-bottom: 34px;
      padding: 10px 16px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text-soft);
      font-size: 0.92rem;
      font-weight: 700;
      text-decoration: none;
      transition: 0.2s ease;
    }

    .home-button:hover {
      color: var(--text);
      border-color: rgba(196, 92, 255, 0.65);
      box-shadow: 0 0 22px rgba(155, 44, 255, 0.25);
    }

    h1 {
      margin: 0 0 24px;
      color: var(--text);
      font-size: clamp(2.2rem, 7vw, 4rem);
      line-height: 1;
      letter-spacing: -0.05em;
      text-align: center;
    }

    .form-wrap {
      overflow: hidden;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow:
        0 24px 70px rgba(0, 0, 0, 0.45),
        0 0 44px rgba(155, 44, 255, 0.12);
    }

    iframe {
      display: block;
      width: 100%;
      min-height: 2124px;
      border: 0;
      background: var(--bg-card);
    }

    @media (max-width: 520px) {
      .page {
        padding: 22px 12px 40px;
      }

      .home-button {
        margin-bottom: 28px;
      }

      h1 {
        font-size: 2.35rem;
      }

      iframe {
        min-height: 2300px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <a class="home-button" href="/radio/index.html">← Home</a>

    <h1>Submit Your Music</h1>

    <section class="form-wrap" aria-label="Music submission form">
      <iframe
        data-tally-src="https://tally.so/embed/J9Xe2J?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1"
        loading="lazy"
        width="100%"
        height="2124"
        frameborder="0"
        marginheight="0"
        marginwidth="0"
        title="Submit Music to Look Who It Is Radio">
      </iframe>
    </section>
  </main>

  <script>
    var d = document;
    var w = "https://tally.so/widgets/embed.js";

    var v = function () {
      if (typeof Tally !== "undefined") {
        Tally.loadEmbeds();
      } else {
        d.querySelectorAll("iframe[data-tally-src]:not([src])").forEach(function (e) {
          e.src = e.dataset.tallySrc;
        });
      }
    };

    if (typeof Tally !== "undefined") {
      v();
    } else if (d.querySelector('script[src="' + w + '"]') == null) {
      var s = d.createElement("script");
      s.src = w;
      s.onload = v;
      s.onerror = v;
      d.body.appendChild(s);
    }
  </script>
</body>
</html>
